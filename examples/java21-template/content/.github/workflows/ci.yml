name: CI/CD

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish Docker image?"
        required: true
        default: "false"

jobs:

# ==========================
# BUILD
# ==========================

  build:
    runs-on: ubuntu-latest
 
    steps:
      - uses: actions/checkout@v5
 
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
 
      - run: mvn clean verify
 
      - run: ls -ltr target/
 
      - name: Upload Jar
        uses: actions/upload-artifact@v5
        with:
          name: app-jar
          path: target/*.jar

# ==========================
# SONAR
# ==========================

  sonar:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Verify Sonar Token
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN is missing"
            exit 1
          fi
          echo "SONAR_TOKEN found"

      - name: Create Sonar Project If Missing
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          curl -u "${SONAR_TOKEN}:" \
            -X POST \
            "https://sonarcloud.io/api/projects/create" \
            -d "organization=devops-champ" \
            -d "project=${{ github.event.repository.name }}" \
            -d "name=${{ github.event.repository.name }}"
        continue-on-error: true

      - name: Sonar Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn org.sonarsource.scanner.maven:sonar-maven-plugin:4.0.0.4121:sonar \
            -Dsonar.projectKey=${{ github.event.repository.name }} \
            -Dsonar.organization=devops-champ \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN


# ==========================
# DOCKER
# ==========================

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: inputs.publish == 'true'
 
    steps:
    - uses: actions/checkout@v5
 
    - name: Download Jar
      uses: actions/download-artifact@v4
      with:
        name: app-jar
        path: target
 
    - name: Verify Artifact
      run: |
        ls -ltr target/
    
    - name: Verify Secrets
      env:
        USERNAME: ${{ secrets.DOCKERHUB_USERNAME_1 }}
        TOKEN: ${{ secrets.DOCKERHUB_TOKEN_1 }}
      run: |
        echo "$USERNAME" | wc -c
        echo "$TOKEN" | wc -c
      
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME_1 }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
 
    - name: Build Docker Image
      run: |
        VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)

        IMAGE=${{ secrets.DOCKERHUB_USERNAME_1 }}/${{ github.event.repository.name }}

        docker build \
          -t $IMAGE:$VERSION \
          -t $IMAGE:latest .

    - name: Push Docker Image
      run: |
        VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)

        IMAGE=${{ secrets.DOCKERHUB_USERNAME_1 }}/${{ github.event.repository.name }}

        docker push $IMAGE:$VERSION
        docker push $IMAGE:latest

